<!DOCTYPE html>
<html lang="en">
    <head>
        <title>BP Soirées</title>
        <link rel="stylesheet" type="text/css" href="Style.css">
        <script src="ScriptInvitation.js"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
    </head>
    <body>
        <div class="jumbotron">
            <h1>AJAX way from stackoverflow ?</h1>
        </div>
        <div class="filling">
            <h2 style="text-align: center">Zone d'inscription aux évenements à venir</h2>

            <form class="formular" action="" methode="post">
                <fieldset>
                    <legend>Informations de l'invité</legend>
                    <input type="text" placeholder="Prénom">
                    <input type="text" placeholder="Nom">
                    <input type="text" placeholder="Téléphone">
                    <input type= "text" placeholder="Adresse mail (active)">
                    <!--<input type="password" id="pwd" name="pwd" placeholder="Clef de la fête">-->
                    <textarea placeholder="Précisions importantes"></textarea>
                    <input type="checkbox" id="conditions" name="conditions" value="agreed" style="flex-direction: row;">
                    <label for="conditions" style="flex-direction: row;">En cochant cette case, vous reconnaissez avoir pris connaissance du contrat de présence aux PB Soirées, 
                        et des conditions obligatoires pour votre présence à cette soirée.
                    </label>
                    <input type="reset">
                    <button class="btn btn-primary btn-block" onclick="data()">
                        <span class="spinner-grow spinner-grow-sm"></span>
                        Confirmez l'inscription
                    </button>
                </fieldset>
            </form>
        </div>
    </body>
</html>
